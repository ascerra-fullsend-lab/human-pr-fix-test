# fullsend shim workflow — with human-PR fix agent gating
name: fullsend

permissions:
  contents: read

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted]

jobs:
  dispatch-review:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'issues' && github.event.action == 'labeled'
        && github.event.label.name == 'ready-for-review') ||
      (github.event_name == 'issue_comment' && (
        github.event.comment.body == '/review' ||
        startsWith(github.event.comment.body, '/review ')
      )) ||
      github.event_name == 'pull_request_target'
    steps:
      - name: Build minimal payload
        id: payload
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_HTML_URL: ${{ github.event.issue.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HTML_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -cn \
            --arg in "${ISSUE_NUMBER:-}" \
            --arg iu "${ISSUE_HTML_URL:-}" \
            --arg pn "${PR_NUMBER:-}" \
            --arg pu "${PR_HTML_URL:-}" \
            '{issue: {number: (if $in != "" then ($in | tonumber) else null end), html_url: (if $iu != "" then $iu else null end)},
              pull_request: {number: (if $pn != "" then ($pn | tonumber) else null end), html_url: (if $pu != "" then $pu else null end)}}')
          echo "json=$PAYLOAD" >> "$GITHUB_OUTPUT"
      - name: Dispatch review
        env:
          GH_TOKEN: ${{ secrets.FULLSEND_DISPATCH_TOKEN }}
          EVENT_PAYLOAD: ${{ steps.payload.outputs.json }}
          EVENT_TYPE: ${{ github.event_name }}
          SOURCE_REPO: ${{ github.repository }}
          DISPATCH_REPO: ${{ github.repository_owner }}/.fullsend
        run: |
          gh workflow run review.yml \
            --repo "$DISPATCH_REPO" \
            --field event_type="$EVENT_TYPE" \
            --field source_repo="$SOURCE_REPO" \
            --field event_payload="$EVENT_PAYLOAD"

  dispatch-fix-bot:
    runs-on: ubuntu-latest
    concurrency:
      group: fix-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    if: >-
      github.event_name == 'pull_request_review'
        && github.event.review.state == 'changes_requested'
        && github.event.review.user.login == format('{0}-review[bot]', github.repository_owner)
        && github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
        && !contains(github.event.pull_request.labels.*.name, 'fullsend-no-fix')
        && (
          endsWith(github.event.pull_request.user.login, '[bot]')
          || contains(github.event.pull_request.labels.*.name, 'fullsend-fix')
        )
    steps:
      - name: Build minimal payload
        id: payload
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.event.pull_request.base.repo.full_name }}
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -cn \
            --arg pn "${PR_NUMBER}" \
            --arg hr "${HEAD_REF}" \
            --arg br "${BASE_REF}" \
            --arg hrepo "${HEAD_REPO}" \
            --arg brepo "${BASE_REPO}" \
            '{pull_request: {number: ($pn | tonumber), head: {ref: $hr, repo: {full_name: $hrepo}}, base: {ref: $br, repo: {full_name: $brepo}}}}')
          echo "json=$PAYLOAD" >> "$GITHUB_OUTPUT"
      - name: Dispatch fix (bot-triggered)
        env:
          GH_TOKEN: ${{ secrets.FULLSEND_DISPATCH_TOKEN }}
          EVENT_PAYLOAD: ${{ steps.payload.outputs.json }}
          EVENT_TYPE: ${{ github.event_name }}
          SOURCE_REPO: ${{ github.repository }}
          DISPATCH_REPO: ${{ github.repository_owner }}/.fullsend
          TRIGGER_USER: ${{ github.event.review.user.login }}
        run: |
          gh workflow run fix.yml \
            --repo "$DISPATCH_REPO" \
            --field event_type="$EVENT_TYPE" \
            --field source_repo="$SOURCE_REPO" \
            --field event_payload="$EVENT_PAYLOAD" \
            --field trigger_source="$TRIGGER_USER"

  dispatch-fix-human:
    runs-on: ubuntu-latest
    concurrency:
      group: fix-${{ github.event.issue.number }}
      cancel-in-progress: true
    if: >-
      github.event_name == 'issue_comment'
        && github.event.issue.pull_request
        && github.event.comment.user.type != 'Bot'
        && (
          github.event.comment.body == '/fix'
          || startsWith(github.event.comment.body, '/fix ')
        )
        && (
          github.event.comment.author_association == 'OWNER'
          || github.event.comment.author_association == 'MEMBER'
          || github.event.comment.author_association == 'COLLABORATOR'
        )
    steps:
      - name: Block fork PRs
        env:
          GH_TOKEN: ${{ secrets.FULLSEND_DISPATCH_TOKEN }}
          PR_URL: ${{ github.event.issue.pull_request.url }}
        run: |
          HEAD_REPO="$(gh api "${PR_URL}" --jq '.head.repo.full_name')"
          BASE_REPO="$(gh api "${PR_URL}" --jq '.base.repo.full_name')"
          if [ "${HEAD_REPO}" != "${BASE_REPO}" ]; then
            echo "::error::Fix agent cannot run on fork PRs"
            exit 1
          fi
      - name: Build minimal payload
        id: payload
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -cn \
            --arg in "${ISSUE_NUMBER}" \
            --arg cb "${COMMENT_BODY:-}" \
            '{issue: {number: ($in | tonumber)}, comment: {body: $cb}}')
          echo "json=$PAYLOAD" >> "$GITHUB_OUTPUT"
      - name: Dispatch fix (human-triggered)
        env:
          GH_TOKEN: ${{ secrets.FULLSEND_DISPATCH_TOKEN }}
          EVENT_PAYLOAD: ${{ steps.payload.outputs.json }}
          EVENT_TYPE: ${{ github.event_name }}
          SOURCE_REPO: ${{ github.repository }}
          DISPATCH_REPO: ${{ github.repository_owner }}/.fullsend
          TRIGGER_USER: ${{ github.event.comment.user.login }}
        run: |
          gh workflow run fix.yml \
            --repo "$DISPATCH_REPO" \
            --field event_type="$EVENT_TYPE" \
            --field source_repo="$SOURCE_REPO" \
            --field event_payload="$EVENT_PAYLOAD" \
            --field trigger_source="$TRIGGER_USER"

  dispatch-stop-fix:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'issue_comment'
        && github.event.issue.pull_request
        && github.event.comment.user.type != 'Bot'
        && github.event.comment.body == '/stop-fix'
        && (
          github.event.comment.author_association == 'OWNER'
          || github.event.comment.author_association == 'MEMBER'
          || github.event.comment.author_association == 'COLLABORATOR'
          || github.event.comment.author_association == 'CONTRIBUTOR'
          || github.event.comment.user.login == github.event.issue.user.login
        )
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Add fullsend-no-fix label and notify
        env:
          GH_TOKEN: ${{ secrets.FULLSEND_DISPATCH_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          gh label create "fullsend-no-fix" --repo "$REPO" \
            --description "Skip bot-triggered fix agent runs" --color "FBCA04" \
            2>/dev/null || true
          gh pr edit "$PR_NUMBER" --repo "$REPO" \
            --add-label "fullsend-no-fix"
          gh pr comment "$PR_NUMBER" --repo "$REPO" \
            --body "Fix agent disabled for this PR. Remove the \`fullsend-no-fix\` label or use \`/fix\` to re-engage."
